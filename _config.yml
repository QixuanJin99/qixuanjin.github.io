# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Qixuan Jin"
title_separator          : "-"
name                     : "Qixuan Jin"
description              : "Personal academic website"
url                      : "https://qixuanjin99.github.io"
baseurl                  : "/qixuanjin.github.io"
repository               : "qixuanjin99/qixuanjin.github.io"

author:
  avatar           : "profile.png"
  name             : "Qixuan Jin"
  email            : "qixuanj@mit.edu"
  employer         : "Massachusetts Institute of Technology"

publication_category:
  publications:
    title: "Publications"

breadcrumbs              : false
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :

atom_feed:
  hide                   : true

analytics:
  provider               : false

include:
  - .htaccess
  - _pages
  - files

collections:
  publications:
    output: true
    permalink: /:collection/:path/

# defaults:
#   - scope:
#       path: ""
#       type: pages
#     values:
#       layout: single
#       author_profile: false

#   - scope:
#       path: ""
#       type: publications
#     values:
#       layout: single
#       author_profile: false
#       share: false
#       comments: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: false
      share: false
      comments: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
  
# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
